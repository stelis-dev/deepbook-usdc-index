name: Backfill DeepBook USDC index

on:
  schedule:
    - cron: "22,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deepbook-usdc-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run check
      - name: Backfill readable pair history
        run: npm run backfill
        env:
          SUI_GRPC_URL: https://fullnode.mainnet.sui.io:443
          SUI_GRAPHQL_URL: https://graphql.mainnet.sui.io/graphql
          BACKFILL_LOOKBACK_HOURS_PER_RUN: "168"
          BACKFILL_MAX_TRANSACTION_PAGES_PER_WINDOW: "80"
      - run: npm run audit:gaps
      - name: Commit generated data
        run: |
          if [ -n "$(git status --porcelain data _workflow)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data _workflow
            git commit -m "Backfill DeepBook USDC index"
            git push
          else
            echo "No data changes"
          fi
