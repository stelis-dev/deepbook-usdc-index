name: Update DeepBook USDC index

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deepbook-usdc-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Sync latest branch
        run: |
          git fetch origin ${{ github.ref_name }}
          git checkout -B ${{ github.ref_name }} origin/${{ github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run check
      - name: Run live collect
        run: npm run collect
        env:
          SUI_GRPC_URL: https://fullnode.mainnet.sui.io:443
          SUI_GRAPHQL_URL: https://graphql.mainnet.sui.io/graphql
          LIVE_RUN_MODE: collect
          COLLECT_MAX_BUCKETS_PER_RUN: "12"
          COLLECT_INITIAL_LOOKBACK_MINUTES: "30"
      - run: npm run audit:gaps
      - name: Commit generated data
        run: |
          if [ -n "$(git status --porcelain data _workflow)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data _workflow
            git commit -m "Update DeepBook USDC index"
            git push || (
              git fetch origin ${{ github.ref_name }}
              git rebase origin/${{ github.ref_name }}
              git push
            )
          else
            echo "No data changes"
          fi
